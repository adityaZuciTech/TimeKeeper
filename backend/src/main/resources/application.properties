spring.application.name=timekeeper

# ── Active profile ─────────────────────────────────────────────────────────────
# Override with: -Dspring.profiles.active=prod (or set env SPRING_PROFILES_ACTIVE)
spring.profiles.active=dev

# ── Server ─────────────────────────────────────────────────────────────────────
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-response=true
# Ensure Tomcat's URI decoder also uses UTF-8 (prevents mojibake in path/query params)
server.tomcat.uri-encoding=UTF-8

# ── JWT (expiry only; secret lives in profile-specific file) ───────────────────
jwt.expiration=3600000

# ── CORS ───────────────────────────────────────────────────────────────────────
cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:3000

# ── JPA base config (dialect; credentials in profile file) ────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
# Force Hibernate to use utf8mb4 on every connection
spring.jpa.properties.hibernate.connection.CharSet=utf8mb4
spring.jpa.properties.hibernate.connection.characterEncoding=utf8mb4
spring.jpa.properties.hibernate.connection.useUnicode=true

# ── Production-safe logging defaults (overridden in dev profile) ───────────────
logging.level.com.timekeeper=INFO
logging.level.org.springframework.security=WARN
spring.jpa.show-sql=false
